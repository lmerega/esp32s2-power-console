name: Arduino Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main
            sketch: .
            artifact: main-firmware
            max_size: "1507328"
          - name: recovery
            sketch: ESP32S2_Recovery_OTA
            artifact: recovery-firmware
            max_size: "1048576"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32@3.3.7 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json

      - name: Install libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "WiFiManager@2.0.17"
          arduino-cli lib install "ArduinoJson@7.4.2"

      - name: Compile ${{ matrix.name }}
        run: |
          mkdir -p "ci-build/${{ matrix.name }}"
          arduino-cli compile \
            --fqbn esp32:esp32:lolin_s2_mini \
            --build-property build.partitions=partitions_factory \
            --build-property upload.maximum_size=${{ matrix.max_size }} \
            --output-dir "ci-build/${{ matrix.name }}" \
            "${{ matrix.sketch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ci-build/${{ matrix.name }}
